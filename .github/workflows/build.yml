name: Build JOKER APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet
        run: |
          pip install flet requests

      - name: Build APK
        run: |
          flet build apk --assets assets

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JokerPro-Release
          path: build/apk/*.apk
